<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materi Perkuliahan</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .card-materi { background-color: #C1FF72; }
        .header-green { background-color: #006432; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <!-- Header -->
    <header class="header-green text-white p-6 rounded-b-[30px] shadow-lg sticky top-0 z-10">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">Materi Perkuliahan</h1>
            <button onclick="toggleModal(true)" class="text-3xl hover:scale-110 transition-transform">
                <i class="fas fa-plus-circle"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-20">
        <div id="materi-container">
            <p class="text-center text-gray-400 mt-10 italic">Menghubungkan ke database...</p>
        </div>
    </main>

    <!-- MODAL INPUT USER -->
    <div id="modalMateri" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-20 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-[#006432]">Kirim Materi Baru</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Mata Kuliah</label>
                    <input type="text" id="judul" placeholder="Contoh: Algoritma" class="w-full border-b-2 border-gray-100 p-1 outline-none focus:border-green-500 transition-colors font-medium">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nama Dosen</label>
                    <input type="text" id="dosen" placeholder="Nama Lengkap Dosen" class="w-full border-b-2 border-gray-100 p-1 outline-none focus:border-green-500 transition-colors font-medium">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Pekan</label>
                    <select id="pekan" class="w-full border-b-2 border-gray-100 p-1 outline-none font-medium">
                        <option value="1">Pekan 1</option>
                        <option value="2">Pekan 2</option>
                        <option value="3">Pekan 3</option>
                        <option value="4">Pekan 4</option>
                        <option value="5">Pekan 5</option>
                        <option value="6">Pekan 6</option>
                        <option value="7">Pekan 7</option>
                        <option value="8">Pekan 8</option>
                        <option value="9">Pekan 9</option>
                        <option value="10">Pekan 10</option>
                        <option value="11">Pekan 11</option>
                        <option value="12">Pekan 12</option>
                        <option value="13">Pekan 13</option>
                        <option value="14">Pekan 14</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Link G-Drive / OneDrive</label>
                    <input type="url" id="linkDoc" placeholder="Tempel link di sini" class="w-full border-b-2 border-gray-100 p-1 outline-none focus:border-green-500 transition-colors font-medium">
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="toggleModal(false)" class="flex-1 py-3 rounded-2xl font-bold text-gray-400 bg-gray-50 hover:bg-gray-100 transition-colors">Batal</button>
                <button id="btnKirim" onclick="handleKirimTelegram()" class="flex-1 py-3 rounded-2xl font-bold text-white header-green shadow-md hover:opacity-90 transition-opacity">Kirim</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA300cLUezP0pstd11tcPIlFfxeF4WPg9c",
            authDomain: "matkul-cd9b9.firebaseapp.com",
            projectId: "matkul-cd9b9",
            storageBucket: "matkul-cd9b9.firebasestorage.app",
            messagingSenderId: "187107535797",
            appId: "1:187107535797:web:79e184f8df7057ebdbc7fc",
            measurementId: "G-WT2ZVDMJMW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const TELEGRAM_TOKEN = "7800730355:AAF1muN3u_U5qmp0I5lQmMZxu98KUHsqH1A";
        const CHAT_ID = "7447271812";

        window.toggleModal = (show) => {
            document.getElementById('modalMateri').classList.toggle('hidden', !show);
        };

        window.handleKirimTelegram = async () => {
            const matkul = document.getElementById('judul').value;
            const dosen = document.getElementById('dosen').value;
            const pekan = document.getElementById('pekan').value;
            const link = document.getElementById('linkDoc').value;
            const btn = document.getElementById('btnKirim');

            if (!matkul || !dosen || !link) return alert("Mohon lengkapi data!");

            btn.disabled = true;
            btn.innerText = "Mengirim...";

            const pesan = `<b>📩 INPUTAN MATKUL MASUK WAK</b>\n━━━━━━━━━━━━━━\n<b>📖 Matkul:</b> ${matkul}\n\n<b>👨‍🏫 Dosen:</b> ${dosen}\n\n<b>📅 Pekan:</b> ${pekan}\n\n<b>🔗 Link:</b> ${link}\n━━━━━━━━━━━━━━`;

            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(pesan)}&parse_mode=html`;

            try {
                await fetch(url);
                alert("Berhasil! Data terkirim ke Admin.");
                toggleModal(false);
            } catch (e) {
                alert("Gagal kirim ke Telegram.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Kirim";
            }
        };

        const container = document.getElementById('materi-container');
        const q = query(collection(db, "materi"), orderBy("pekan", "asc"));
        const isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';

        onSnapshot(q, (snapshot) => {
            container.innerHTML = "";
            let lastPekan = null;

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;

                if (lastPekan !== data.pekan) {
                    lastPekan = data.pekan;
                    container.innerHTML += `<h2 class="text-gray-400 font-bold text-lg mt-8 mb-4 border-b border-gray-100 pb-2 tracking-wide">Pekan ${lastPekan}</h2>`;
                }

                container.innerHTML += `
                    <div class="card-materi rounded-[25px] p-5 mb-4 flex items-center justify-between shadow-sm border border-green-200">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 header-green rounded-2xl flex items-center justify-center text-white text-xl shadow-inner">
                                <i class="fas fa-file-alt"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-gray-800 leading-tight">${data.judul}</h3>
                                <p class="text-[11px] font-medium text-green-900 opacity-70 mb-2">Dosen: ${data.dosen || '-'}</p>
                                <a href="${data.url}" target="_blank" class="inline-block text-[10px] font-bold text-white bg-[#006432] px-4 py-1.5 rounded-full shadow-sm hover:scale-105 transition-transform">BUKA MATERI</a>
                            </div>
                        </div>
                        <div class="${isAdmin ? 'flex' : 'hidden'} flex-col gap-1">
                             <button onclick="hapusData('${id}')" class="bg-[#FF3131] text-white text-[10px] px-3 py-1 rounded-full font-bold shadow-sm">HAPUS</button>
                        </div>
                    </div>`;
            });
        });

        window.hapusData = async (id) => {
            if (confirm("Hapus data ini?")) await deleteDoc(doc(db, "materi", id));
        };
    </script>
</body>
</html>
