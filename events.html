<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaEvents - Real-time JSON</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --accent: #00b894;
            --bg: #f8f9fa;
            --text-dark: #2d3436;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1e272e;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Frame Mobile */
        .phone-frame {
            width: 100%;
            max-width: 414px;
            height: 85vh;
            background: var(--bg);
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        header {
            background: white;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        /* Tombol Kembali */
        .back-btn {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background 0.2s;
            margin-left: -10px;
        }

        .back-btn:active {
            background: #f1f2f6;
        }

        .header-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        h1 { margin: 0; font-size: 1.3rem; color: var(--text-dark); }

        /* Badge Status Real-time */
        .status-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-online { background: rgba(0, 184, 148, 0.1); color: var(--accent); }
        .status-offline { background: rgba(255, 118, 117, 0.1); color: #ff7675; }

        .dot {
            height: 8px; width: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .pulse { animation: pulse-animation 1.5s infinite; background-color: var(--accent); }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 184, 148, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 184, 148, 0); }
        }

        /* Content Area */
        #event-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Card Styling */
        .event-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            animation: slideIn 0.4s ease forwards;
            border: 1px solid rgba(0,0,0,0.02);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .event-icon {
            font-size: 2rem;
            background: #f1f2f6;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
        }

        .event-details { flex: 1; }
        .event-details span { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--primary); }
        .event-details h3 { margin: 2px 0; font-size: 1rem; color: var(--text-dark); }
        .event-details p { margin: 0; font-size: 12px; color: #636e72; }

        .skeleton {
            background: #eee;
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            background-size: 200% 100%;
            animation: 1.5s shine linear infinite;
            height: 80px;
            border-radius: 18px;
        }

        @keyframes shine { to { background-position-x: -200%; } }
    </style>
</head>
<body>

    <div class="phone-frame">
        <header>
            <div class="header-top">
                <a href="beta1.html" class="back-btn" title="Kembali">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                
                <div id="status-ui" class="status-badge status-online">
                    <span id="status-dot" class="dot pulse"></span>
                    <span id="status-text">SYNCING</span>
                </div>
            </div>
            <div class="header-title-row">
                <h1>Daftar Event</h1>
            </div>
        </header>

        <div id="event-container">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </div>

    <script>
        // Ganti link di bawah ini dengan URL JSON Anda
        const JSON_URL = 'https://api.npoint.io/8ac57bccba151a30015f'; 

        const container = document.getElementById('event-container');
        const statusUI = document.getElementById('status-ui');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        async function getEvents() {
            try {
                const response = await fetch(JSON_URL);
                if (!response.ok) throw new Error('Network Error');
                const data = await response.json();
                
                // Menangani berbagai format pembungkus data JSON
                const eventList = data.data?.events || data.events || data;

                renderUI(eventList);
                setOnlineStatus(true);
            } catch (error) {
                console.error("Fetch error:", error);
                setOnlineStatus(false);
            }
        }

        function renderUI(events) {
            container.innerHTML = ''; 
            events.forEach((event, index) => {
                const card = document.createElement('div');
                card.className = 'event-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <div class="event-icon">${event.icon || '📅'}</div>
                    <div class="event-details">
                        <span>${event.category || 'Umum'}</span>
                        <h3>${event.title}</h3>
                        <p>📍 ${event.location} • ${event.date}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function setOnlineStatus(isOnline) {
            if (isOnline) {
                statusUI.className = 'status-badge status-online';
                statusText.innerText = 'LIVE';
                statusDot.className = 'dot pulse';
            } else {
                statusUI.className = 'status-badge status-offline';
                statusText.innerText = 'OFFLINE';
                statusDot.className = 'dot';
                statusDot.style.backgroundColor = '#ff7675';
            }
        }

        getEvents();
        // Refresh otomatis setiap 10 detik
        setInterval(getEvents, 10000);
    </script>
</body>
</html>
