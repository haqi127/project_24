<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Guru</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4361ee;
            --success: #4cc9f0;
            --bg: #f8f9fa;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0;
            color: #333;
        }

        /* Header Modern dengan efek Blur */
        .header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #1a1a1a;
            padding: 20px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            animation: fadeInDown 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-back {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 22px;
            margin-right: 20px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .btn-back:active { background: rgba(0,0,0,0.05); }

        .container { padding: 20px; }

        /* Card yang lebih Luwes (Bouncy Animation) */
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.9); }
            70% { transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); }
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            opacity: 0;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .name { 
            font-weight: 600; 
            font-size: 1.15rem; 
            margin-bottom: 4px;
        }

        .subject { 
            color: #888; 
            font-size: 0.85rem; 
            margin-bottom: 18px;
            display: flex;
            align-items: center;
        }

        .subject::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            margin-right: 8px;
        }

        .btn-call {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 14px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 500;
            font-size: 0.95rem;
            display: block;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.2);
        }

        .btn-call:active {
            transform: scale(0.96);
            filter: brightness(1.1);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="beta1.html" class="btn-back">❮</a>
    <h2 style="margin: 0; font-size: 1.2rem; font-weight: 600;">Direktori Guru</h2>
</div>

<div class="container" id="kontak-list">
    </div>

<script>
    async function loadContacts() {
        const container = document.getElementById('kontak-list');
        
        try {
            // "Anti-Cache": Menambahkan parameter ?t=[waktu] agar file JSON selalu dianggap baru
            const timestamp = new Date().getTime();
            const response = await fetch(`https://api.npoint.io/c5c5480153eddb1494cf?t=${timestamp}`);
            
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.json();
            container.innerHTML = ''; // Kosongkan container sebelum mengisi ulang

            data.forEach((guru, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.08}s`;
                
                card.innerHTML = `
                    <div class="name">${guru.nama}</div>
                    <div class="subject">${guru.mapel}</div>
                    <a href="https://wa.me/${guru.whatsapp}" class="btn-call">Kirim Pesan</a>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            container.innerHTML = `<div style="text-align:center; padding-top:50px; color:#888;">
                Gagal memuat data. Periksa file JSON kamu.
            </div>`;
        }
    }

    // Jalankan saat halaman dibuka
    loadContacts();

    // Auto-refresh data setiap 30 detik (opsional)
    // setInterval(loadContacts, 30000);
</script>

</body>
</html>
